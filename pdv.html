<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDV - Frente de Caixa</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
</head>
<body>
    <nav class="sidebar">
        <div class="sidebar-header"><h3>Mercado BOM D+</h3></div>
        <ul>
            <li><a href="dashboard.html"><i class="fas fa-home"></i> Início</a></li>
            <li class="active"><a href="pdv.html"><i class="fas fa-cash-register"></i> PDV / Caixa</a></li>
            <li><a href="produtos.html"><i class="fas fa-box"></i> Produtos</a></li>
            <li><a href="devedores.html"><i class="fas fa-user-clock"></i> Devedores</a></li>
            <li><a href="categorias.html"><i class="fas fa-tags"></i> Categorias</a></li>
            <li><a href="relatorios-vendas.html"><i class="fas fa-chart-bar"></i> Relatórios</a></li>
            <li><a href="configuracoes.html"><i class="fas fa-cog"></i> Configurações</a></li>
        </ul>
        <div class="sidebar-footer"><a href="#"><i class="fas fa-sign-out-alt"></i> Sair</a></div>
    </nav>

    <main class="content">
        <header class="top-header">
            <i class="fas fa-bars" id="btn-menu-mobile" style="font-size: 1.5rem; cursor: pointer; margin-right: 15px; display: none; color: #333;"></i>
            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" id="global-search-input" placeholder="Pesquisar páginas..." autocomplete="off">
                <div id="global-search-results" class="suggestions-list" style="display: none;"></div>
            </div>
            
            <div class="user-info">
                <i class="fas fa-bell"></i>
                <div class="profile-dropdown-container" id="profile-dropdown">
                    <img src="https://via.placeholder.com/40" alt="Avatar" id="header-profile-pic">
                    <strong id="header-profile-name">Carregando...</strong>
                    <i class="fas fa-chevron-down"></i>
                    <div class="profile-dropdown-content" id="profile-dropdown-list"></div>
                </div>
            </div>
        </header>

        <div class="page-header"><h1>Frente de Caixa (PDV)</h1></div>

        <div class="pdv-layout">
            <div class="pdv-venda-col card">
                <div class="form-group">
                    <label>Código de Barras (Manual ou Leitor USB):</label>
                    <div style="display: flex; gap: 10px;">
                        <input type="text" id="codigo-manual" placeholder="Bipe ou digite o código" style="flex: 1; font-size: 1.1rem; font-weight: bold;">
                        <button id="btn-add-manual" class="btn-primary" style="width: auto; padding: 0 20px;"><i class="fas fa-plus"></i></button>
                    </div>
                </div>
                <div style="border-radius: 8px; overflow: hidden; border: 2px solid var(--border-light); margin-bottom: 20px;">
                    <div id="pdv-camera-reader" style="width: 100%;"></div>
                </div>

                <table style="width: 100%; border-collapse: collapse; margin-top: 10px;">
                    <thead><tr><th>Produto</th><th>Qtd</th><th>Preço</th><th>Subtotal</th><th></th></tr></thead>
                    <tbody id="carrinho-body"></tbody>
                </table>
            </div>

            <div class="pdv-pagamento-col card">
                <div class="pdv-total-display">
                    <span>Total a Pagar</span>
                    <strong id="total-venda">R$ 0,00</strong>
                </div>
                <div class="form-group">
                    <label>Forma de Pagamento:</label>
                    <select id="forma-pagamento" style="font-size: 1.1rem; padding: 15px;">
                        <option value="dinheiro">💵 Dinheiro</option>
                        <option value="cartao">💳 Cartão (Débito/Crédito)</option>
                        <option value="pix">💠 PIX</option>
                    </select>
                </div>
                <button id="btn-finalizar-venda" class="btn-primary" style="width: 100%; padding: 18px; font-size: 1.2rem;"><i class="fas fa-check-circle"></i> Finalizar Venda</button>
            </div>
        </div>
    </main>

    <div id="delete-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <span class="modal-close-icon">&times;</span>
            <i class="fas fa-exclamation-triangle modal-icon-alert" id="modal-icon"></i>
            <h2>Aviso</h2>
            <p>Mensagem</p>
            <div class="modal-actions">
                <button id="modal-btn-cancel" class="btn-secondary" style="display: none;">Cancelar</button>
                <button id="modal-btn-confirm" class="btn-primary">OK</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <script type="module" src="app.js"></script>

    <script type="module">
        import { db } from './firebase-config.js';
        import { doc, getDoc, collection, query, where, getDocs, writeBatch, increment, setDoc } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore.js";

        let carrinho = [];
        const empresaId = localStorage.getItem('empresaId');

        // Iniciar Câmera
        let pdvScanner = new Html5QrcodeScanner("pdv-camera-reader", { fps: 10, qrbox: { width: 250, height: 100 } }, false);
        pdvScanner.render((textoDecodificado) => {
            adicionarAoCarrinho(textoDecodificado);
            pdvScanner.pause(true);
            setTimeout(() => pdvScanner.resume(), 2000); 
        }, () => {});

        document.getElementById('btn-add-manual').addEventListener('click', () => {
            const val = document.getElementById('codigo-manual').value;
            if(val) adicionarAoCarrinho(val);
        });
        document.getElementById('codigo-manual').addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && e.target.value) adicionarAoCarrinho(e.target.value);
        });

        // Busca Dupla
        async function adicionarAoCarrinho(skuLido) {
            if(!empresaId) return;
            try {
                let prod = null;
                let skuPrincipal = skuLido;

                const docRef = await getDoc(doc(db, "empresas", empresaId, "produtos", skuLido));
                if (docRef.exists()) {
                    prod = docRef.data();
                } else {
                    const buscaExtra = await getDocs(query(collection(db, "empresas", empresaId, "produtos"), where('codigos_adicionais', 'array-contains', skuLido)));
                    if (!buscaExtra.empty) {
                        prod = buscaExtra.docs[0].data();
                        skuPrincipal = buscaExtra.docs[0].id; 
                    }
                }

                if (!prod) { 
                    await window.mostrarModal("Não encontrado", "Este produto não está no estoque.", "aviso"); 
                    document.getElementById('codigo-manual').value = '';
                    return; 
                }
                
                new Audio('https://www.soundjay.com/buttons/beep-07a.mp3').play().catch(()=>{});
                
                const itemExistente = carrinho.find(i => i.sku === skuPrincipal);
                if (itemExistente) itemExistente.quantidade++;
                else carrinho.push({ sku: skuPrincipal, nome: prod.nome, preco: parseFloat(prod.venda)||0, quantidade: 1 });
                
                document.getElementById('codigo-manual').value = '';
                atualizarCarrinho();
            } catch (e) { console.error(e); }
        }

        function atualizarCarrinho() {
            const tbody = document.getElementById('carrinho-body');
            tbody.innerHTML = '';
            let total = 0;
            carrinho.forEach((item, i) => {
                const sub = item.preco * item.quantidade;
                total += sub;
                tbody.innerHTML += `
                    <tr>
                        <td><strong>${item.nome}</strong><br><small style="color:var(--text-gray)">${item.sku}</small></td>
                        <td style="display:flex; align-items:center; gap:8px;">
                            <button onclick="mudarQtd(${i}, -1)" class="btn-secondary" style="padding:2px 8px;">-</button> 
                            <span style="font-weight:600;">${item.quantidade}</span> 
                            <button onclick="mudarQtd(${i}, 1)" class="btn-secondary" style="padding:2px 8px;">+</button>
                        </td>
                        <td>R$ ${item.preco.toFixed(2)}</td>
                        <td><strong style="color:var(--primary-green)">R$ ${sub.toFixed(2)}</strong></td>
                        <td><button onclick="remover(${i})" style="background:none; border:none; color:var(--danger-color); cursor:pointer;"><i class="fas fa-trash-alt"></i></button></td>
                    </tr>`;
            });
            document.getElementById('total-venda').textContent = `R$ ${total.toFixed(2)}`;
        }

        window.mudarQtd = (i, v) => { carrinho[i].quantidade += v; if(carrinho[i].quantidade <= 0) remover(i); else atualizarCarrinho(); }
        window.remover = (i) => { carrinho.splice(i, 1); atualizarCarrinho(); }

        // Finalizar Venda
        document.getElementById('btn-finalizar-venda').addEventListener('click', async () => {
            if(carrinho.length === 0) { await window.mostrarModal("Aviso", "Carrinho vazio!", "aviso"); return; }

            const pagto = document.getElementById('forma-pagamento').value;
            const nomePagto = document.getElementById('forma-pagamento').options[document.getElementById('forma-pagamento').selectedIndex].text;
            const total = carrinho.reduce((acc, i) => acc + (i.preco * i.quantidade), 0);
            
            const querFinalizar = await window.mostrarModal("Confirmar Venda", `Total: R$ ${total.toFixed(2)}\nPagto: ${nomePagto}`, "confirmacao");
            if(!querFinalizar) return; 
            
            try {
                const batch = writeBatch(db);
                carrinho.forEach(item => {
                    batch.update(doc(db, "empresas", empresaId, "produtos", item.sku), { qtd: increment(-item.quantidade) });
                });
                await batch.commit();

                const dataHoje = new Date().toLocaleDateString('pt-BR');
                let incs = { total: increment(total), data: dataHoje, mes: new Date().getMonth()+1, ano: new Date().getFullYear() };
                incs[pagto] = increment(total);
                
                await setDoc(doc(db, "empresas", empresaId, "fechamentos", dataHoje), incs, { merge: true });
                
                await window.mostrarModal("Sucesso!", "Venda finalizada com sucesso!", "aviso");
                carrinho = []; atualizarCarrinho();
            } catch(e) { await window.mostrarModal("Erro", "Falha: " + e.message, "aviso"); }
        });
    </script>
</body>
</html>
