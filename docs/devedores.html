<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Devedores - Mercado BOM D+</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
</head>
<body>
    
    <nav class="sidebar">
        <div class="sidebar-header">
            <h3>Mercado BOM D+</h3>
        </div>
        <ul>
            <li><a href="dashboard.html"><i class="fas fa-home"></i> Início</a></li>
            <li><a href="produtos.html"><i class="fas fa-box"></i> Produtos</a></li>
            <li><a href="categorias.html"><i class="fas fa-tags"></i> Categorias</a></li>
            <li class="active"><a href="devedores.html"><i class="fas fa-user-clock"></i> Devedores</a></li>
            <li><a href="relatorios-vendas.html"><i class="fas fa-chart-bar"></i> Relatórios</a></li>
            <li><a href="configuracoes.html"><i class="fas fa-cog"></i> Configurações</a></li>
        </ul>
        <div class="sidebar-footer">
            <a href="index.html"><i class="fas fa-sign-out-alt"></i> Sair</a>
        </div>
    </nav>

    <main class="content">
        <header class="top-header">
            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" id="global-search-input" placeholder="Pesquisar..." autocomplete="off">
            </div>
            <div class="user-info">
                <strong id="header-profile-name">Carregando...</strong>
            </div>
        </header>

        <div class="page-header">
            <h1>Controle de Devedores / Fiado</h1>
        </div>

        <div class="page-grid">
            <div class="card">
                <h3 class="card-title">Novo Registro de Dívida</h3>
                <form id="form-add-devedor" class="form-layout">
                    <div class="form-group">
                        <label>Nome do Cliente</label>
                        <input type="text" id="nome-devedor" placeholder="Ex: João Silva" required>
                    </div>
                    <div class="form-group">
                        <label>Valor (R$)</label>
                        <input type="number" id="valor-divida" step="0.01" placeholder="0,00" required>
                    </div>
                    <div class="form-group">
                        <label>Data da Compra</label>
                        <input type="date" id="data-divida" required>
                    </div>
                    <div class="form-group">
                        <label>Descrição (Opcional)</label>
                        <input type="text" id="descricao-divida" placeholder="Ex: 2 Coca-Colas">
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn-primary">Salvar Dívida</button>
                    </div>
                </form>
            </div>

            <div class="card">
                <h3 class="card-title">Lista de Devedores</h3>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Data</th>
                                <th>Cliente</th>
                                <th>Descrição</th>
                                <th>Valor</th>
                                <th>Ação</th>
                            </tr>
                        </thead>
                        <tbody id="lista-devedores-body">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="app.js"></script>
</body>
</html>
