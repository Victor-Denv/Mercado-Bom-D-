<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Frente de Caixa (PDV) - BOM D+</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .pdv-container { display: flex; gap: 24px; padding: 24px; height: calc(100vh - 80px); }
        .pdv-left { flex: 1; display: flex; flex-direction: column; gap: 20px; }
        .pdv-right { flex: 1; background: var(--card-bg); padding: 24px; border-radius: var(--radius); box-shadow: var(--shadow); display: flex; flex-direction: column; }
        .camera-box { background: #0f172a; border-radius: var(--radius); overflow: hidden; flex: 1; display: flex; align-items: center; justify-content: center; position: relative;}
        .cart-table-container { flex: 1; overflow-y: auto; margin-bottom: 20px; border: 1px solid var(--border-color); border-radius: 8px;}
        .cart-table { width: 100%; border-collapse: collapse; }
        .cart-table th { padding: 16px; text-align: left; border-bottom: 1px solid var(--border-color); }
        .total-box { background: var(--dark-bg); color: #fff; padding: 24px; border-radius: var(--radius); text-align: right; margin-bottom: 20px;}
        .total-box h2 { margin: 0; font-size: 2.8rem; color: #10b981; }
        .btn-finalizar { background: var(--success-color); color: white; border: none; padding: 18px; font-size: 1.2rem; border-radius: var(--radius); cursor: pointer; width: 100%;}
        .btn-finalizar:hover { background: var(--success-hover); transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.3); }
        .qtd-btn { background: #e2e8f0; border: none; width: 28px; height: 28px; border-radius: 50%; font-weight: bold; cursor: pointer; color: var(--text-main);}
        .qtd-btn:hover { background: #cbd5e1; }
        #pdv-camera-reader { width: 100%; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-header"><h2><i class="fas fa-store"></i> BOM D+</h2></div>
        <ul class="sidebar-menu">
            <li><a href="dashboard.html"><i class="fas fa-home"></i> Início</a></li>
            <li><a href="frente-caixa.html" class="active"><i class="fas fa-desktop"></i> Frente de Caixa</a></li>
            <li><a href="produtos.html"><i class="fas fa-box"></i> Produtos</a></li>
            <li><a href="adicionar-produto.html"><i class="fas fa-plus"></i> Add Produto</a></li>
        </ul>
        <div class="sidebar-footer"><a href="#" id="btn-sair"><i class="fas fa-sign-out-alt"></i> Sair</a></div>
    </aside>

    <main class="main-content">
        <header class="top-header"><h1>Frente de Caixa (PDV)</h1></header>
        <div class="pdv-container">
            
            <div class="pdv-left">
                <div class="form-group" style="background: var(--card-bg); padding: 20px; border-radius: var(--radius); box-shadow: var(--shadow); margin: 0;">
                    <label>Código de Barras (Manual):</label>
                    <div style="display: flex; gap: 10px;">
                        <input type="text" id="codigo-manual" placeholder="Bipe ou digite o código" style="flex: 1; padding: 15px; font-size: 1.1rem;">
                        <button id="btn-add-manual" class="btn-action" style="background: var(--primary-color); color: white; border: none; border-radius: 8px; width: 60px;"><i class="fas fa-plus"></i></button>
                    </div>
                </div>
                <div class="camera-box"><div id="pdv-camera-reader" style="width: 100%;"></div></div>
            </div>

            <div class="pdv-right">
                <h2 style="margin-bottom: 15px; font-size: 1.2rem; color: var(--text-muted);">Carrinho de Compras</h2>
                <div class="cart-table-container">
                    <table class="cart-table">
                        <thead><tr><th>Produto</th><th>Qtd</th><th>Preço</th><th>Subtotal</th><th></th></tr></thead>
                        <tbody id="carrinho-body"></tbody>
                    </table>
                </div>
                <div class="total-box"><p style="opacity: 0.7; font-size: 1.1rem;">Total a Pagar</p><h2 id="total-venda">R$ 0,00</h2></div>
                <div class="form-group">
                    <select id="forma-pagamento" style="padding: 15px; font-size: 1.1rem;">
                        <option value="dinheiro">💵 Dinheiro</option>
                        <option value="cartao">💳 Cartão (Débito/Crédito)</option>
                        <option value="pix">💠 PIX</option>
                    </select>
                </div>
                <button id="btn-finalizar-venda" class="btn-finalizar"><i class="fas fa-check-circle"></i> Finalizar Venda</button>
            </div>
        </div>
    </main>

    <div id="sistema-modal" class="modal-overlay" style="display: none;">
        <div class="modal-box">
            <div class="modal-header"><h3 id="modal-titulo">Aviso</h3></div>
            <div class="modal-body"><p id="modal-mensagem" style="font-size: 1.1rem; font-weight: 500;"></p></div>
            <div class="modal-footer">
                <button id="modal-btn-cancelar" class="btn-modal-cancel" style="display: none;">Cancelar</button>
                <button id="modal-btn-ok" class="btn-modal-confirm">Confirmar</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <script src="firebase-config.js"></script>
    <script src="auth-guard.js"></script>

    <script>
        let carrinho = [];
        
        // 1. Iniciar Câmera
        let pdvScanner = new Html5QrcodeScanner("pdv-camera-reader", { fps: 10, qrbox: { width: 250, height: 100 } }, false);
        pdvScanner.render((textoDecodificado) => {
            adicionarAoCarrinho(textoDecodificado);
            pdvScanner.pause(true);
            setTimeout(() => pdvScanner.resume(), 2000); 
        }, () => {});

        document.getElementById('btn-add-manual').addEventListener('click', () => {
            const val = document.getElementById('codigo-manual').value;
            if(val) adicionarAoCarrinho(val);
        });
        document.getElementById('codigo-manual').addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && e.target.value) adicionarAoCarrinho(e.target.value);
        });

        // 2. Busca Dupla de Produtos
        async function adicionarAoCarrinho(skuLido) {
            try {
                let prod = null;
                let skuPrincipal = skuLido;

                const docRef = await db.collection('produtos').doc(skuLido).get();
                if (docRef.exists) {
                    prod = docRef.data();
                } else {
                    const buscaExtra = await db.collection('produtos').where('codigos_adicionais', 'array-contains', skuLido).get();
                    if (!buscaExtra.empty) {
                        prod = buscaExtra.docs[0].data();
                        skuPrincipal = buscaExtra.docs[0].id; 
                    }
                }

                if (!prod) { 
                    await window.mostrarModal("Não encontrado", "Este código não está cadastrado."); 
                    document.getElementById('codigo-manual').value = '';
                    return; 
                }
                
                new Audio('https://www.soundjay.com/buttons/beep-07a.mp3').play().catch(()=>{});
                
                const itemExistente = carrinho.find(i => i.sku === skuPrincipal);
                if (itemExistente) itemExistente.quantidade++;
                else carrinho.push({ sku: skuPrincipal, nome: prod.nome, preco: parseFloat(prod.venda)||0, quantidade: 1, custo: parseFloat(prod.custo)||0 });
                
                document.getElementById('codigo-manual').value = '';
                atualizarCarrinho();
            } catch (e) { console.error(e); }
        }

        function atualizarCarrinho() {
            const tbody = document.getElementById('carrinho-body');
            tbody.innerHTML = '';
            let total = 0;
            carrinho.forEach((item, i) => {
                const sub = item.preco * item.quantidade;
                total += sub;
                tbody.innerHTML += `
                    <tr>
                        <td><strong style="color:var(--text-main)">${item.nome}</strong><br><small style="color:var(--text-muted)">${item.sku}</small></td>
                        <td style="display:flex; align-items:center; gap:8px;">
                            <button class="qtd-btn" onclick="mudarQtd(${i}, -1)">-</button> 
                            <span style="font-weight:600;">${item.quantidade}</span> 
                            <button class="qtd-btn" onclick="mudarQtd(${i}, 1)">+</button>
                        </td>
                        <td>R$ ${item.preco.toFixed(2)}</td>
                        <td><strong style="color:var(--primary-color)">R$ ${sub.toFixed(2)}</strong></td>
                        <td><button onclick="remover(${i})" style="background:none; border:none; color:var(--danger-color); cursor:pointer; font-size:1.2rem;"><i class="fas fa-trash-alt"></i></button></td>
                    </tr>`;
            });
            document.getElementById('total-venda').textContent = `R$ ${total.toFixed(2)}`;
        }

        window.mudarQtd = (i, v) => { carrinho[i].quantidade += v; if(carrinho[i].quantidade <= 0) remover(i); else atualizarCarrinho(); }
        window.remover = (i) => { carrinho.splice(i, 1); atualizarCarrinho(); }

        // 3. Finalizar Venda e Abater Estoque
        document.getElementById('btn-finalizar-venda').addEventListener('click', async () => {
            if(carrinho.length === 0) {
                await window.mostrarModal("Aviso", "Carrinho vazio!"); return;
            }

            const pagto = document.getElementById('forma-pagamento').value;
            const nomePagto = document.getElementById('forma-pagamento').options[document.getElementById('forma-pagamento').selectedIndex].text;
            const total = carrinho.reduce((acc, i) => acc + (i.preco * i.quantidade), 0);
            
            const querFinalizar = await window.mostrarModal("Confirmar Venda", `Total: R$ ${total.toFixed(2)}\nPagto: ${nomePagto}`, "confirmacao");
            if(!querFinalizar) return; 
            
            try {
                const batch = db.batch();
                carrinho.forEach(item => {
                    batch.update(db.collection('produtos').doc(item.sku), { qtd: firebase.firestore.FieldValue.increment(-item.quantidade) });
                });
                await batch.commit();

                const dataHoje = new Date().toLocaleDateString('pt-BR');
                let incs = { total: firebase.firestore.FieldValue.increment(total), data: dataHoje, mes: new Date().getMonth()+1, ano: new Date().getFullYear() };
                incs[pagto] = firebase.firestore.FieldValue.increment(total);
                
                await db.collection('fechamentos').doc(dataHoje).set(incs, { merge: true });
                
                await window.mostrarModal("Sucesso!", "Venda finalizada com sucesso!");
                carrinho = []; atualizarCarrinho();
            } catch(e) { await window.mostrarModal("Erro", "Falha: " + e.message); }
        });

        document.getElementById('btn-sair').addEventListener('click', () => auth.signOut());
        
    </script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    
    <script type="module" src="app.js"></script>
</body>
</html>
