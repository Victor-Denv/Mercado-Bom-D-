<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adicionar Produto - Mercado BOM D+</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
</head>
<body>
    <nav class="sidebar">
        <div class="sidebar-header">
            <h3>Mercado BOM D+</h3>
        </div>
        <ul>
            <li><a href="dashboard.html"><i class="fas fa-home"></i> Início</a></li>
            <li><a href="pdv.html"><i class="fas fa-cash-register"></i> PDV / Caixa</a></li>
            <li class="active"><a href="produtos.html"><i class="fas fa-box"></i> Produtos</a></li>
            <li><a href="devedores.html"><i class="fas fa-user-clock"></i> Devedores</a></li>
            <li><a href="categorias.html"><i class="fas fa-tags"></i> Categorias</a></li>
            <li><a href="relatorios-vendas.html"><i class="fas fa-chart-bar"></i> Relatórios</a></li>
            <li><a href="configuracoes.html"><i class="fas fa-cog"></i> Configurações</a></li>
        </ul>
        <div class="sidebar-footer">
            <a href="#"><i class="fas fa-sign-out-alt"></i> Sair</a>
        </div>
    </nav>

    <main class="content">
        <header class="top-header">
            <i class="fas fa-bars" id="btn-menu-mobile" style="font-size: 1.5rem; cursor: pointer; margin-right: 15px; display: none; color: #333;"></i>
            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" id="global-search-input" placeholder="Pesquisar páginas..." autocomplete="off">
                <div id="global-search-results" class="suggestions-list" style="display: none;"></div>
            </div>
            
            <div class="user-info">
                <i class="fas fa-bell"></i>
                <div class="profile-dropdown-container" id="profile-dropdown">
                    <img src="https://via.placeholder.com/40" alt="Avatar" id="header-profile-pic">
                    <strong id="header-profile-name">Carregando...</strong>
                    <i class="fas fa-chevron-down"></i>
                    <div class="profile-dropdown-content" id="profile-dropdown-list"></div>
                </div>
            </div>
        </header>

        <div class="page-header">
            <h1>Adicionar Novo Produto</h1>
        </div>

        <div class="card" style="max-width: 800px;">
            <form id="form-add-product" class="form-layout">
                <div class="form-group">
                    <label>Nome do Produto:</label>
                    <input type="text" id="nome-produto" required>
                </div>
                
                <div class="form-group">
                    <label>Código Principal (SKU) / Código de Barras:</label>
                    <div style="display: flex; gap: 10px;">
                        <input type="text" id="sku-produto" required style="flex: 1;">
                        <button type="button" id="btn-scan-sku" class="btn-primary" style="width: auto; padding: 0 15px;"><i class="fas fa-camera"></i> Ler Código</button>
                    </div>
                    <div id="camera-reader" style="width: 100%; max-width: 400px; display: none; margin-top: 15px; border-radius: 8px; overflow: hidden; border: 2px solid var(--primary-green);"></div>
                </div>

                <div class="form-group">
                    <label>Códigos Adicionais (separados por vírgula):</label>
                    <input type="text" id="codigos-adicionais" placeholder="Ex: 789123, 789124 (Opcional)">
                    <small class="form-hint">Útil se a embalagem promocional tiver outro código, mas for o mesmo produto.</small>
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label>Categoria:</label>
                        <select id="categoria-produto"><option value="Geral">Geral</option></select>
                    </div>
                    <div class="form-group"><label>Custo (R$):</label><input type="number" step="0.01" id="preco-custo" required></div>
                    <div class="form-group"><label>Venda (R$):</label><input type="number" step="0.01" id="preco-venda" required></div>
                    <div class="form-group"><label>Qtd Inicial:</label><input type="number" id="qtd-inicial" required></div>
                    <div class="form-group"><label>Estoque Mínimo:</label><input type="number" id="estoque-minimo" value="10" required></div>
                    <div class="form-group"><label>Vencimento (Opcional):</label><input type="date" id="data-vencimento"></div>
                </div>
                
                <div class="form-actions">
                    <a href="produtos.html" class="btn-secondary">Cancelar</a>
                    <button type="submit" class="btn-primary"><i class="fas fa-save"></i> Salvar Produto</button>
                </div>
            </form>
        </div>
    </main>

    <div id="delete-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <span class="modal-close-icon">&times;</span>
            <i class="fas fa-exclamation-triangle modal-icon-alert"></i>
            <h2>Aviso</h2>
            <p>Mensagem</p>
            <div class="modal-actions">
                <button id="modal-btn-cancel" class="btn-secondary" style="display: none;">Cancelar</button>
                <button id="modal-btn-confirm" class="btn-primary">OK</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <script type="module" src="app.js"></script>
    
    <script>
        const btnScanSku = document.getElementById('btn-scan-sku');
        const cameraReaderDiv = document.getElementById('camera-reader');
        let html5QrcodeScanner = null;

        btnScanSku.addEventListener('click', () => {
            if (cameraReaderDiv.style.display === 'block') {
                html5QrcodeScanner.clear(); cameraReaderDiv.style.display = 'none';
                btnScanSku.innerHTML = '<i class="fas fa-camera"></i> Ler Código';
            } else {
                cameraReaderDiv.style.display = 'block';
                btnScanSku.innerHTML = '<i class="fas fa-times"></i> Fechar Câmara';
                html5QrcodeScanner = new Html5QrcodeScanner("camera-reader", { fps: 10, qrbox: { width: 250, height: 100 } }, false);
                html5QrcodeScanner.render((texto) => {
                    document.getElementById('sku-produto').value = texto;
                    new Audio('https://www.soundjay.com/buttons/beep-07a.mp3').play().catch(()=>{});
                    html5QrcodeScanner.clear(); cameraReaderDiv.style.display = 'none';
                    btnScanSku.innerHTML = '<i class="fas fa-camera"></i> Ler Código';
                }, () => {});
            }
        });
    </script>
</body>
</html>
